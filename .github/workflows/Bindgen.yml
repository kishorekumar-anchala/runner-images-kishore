name: Check Bindgen Version

on:
  # Trigger this workflow on push to the main branch or manually
  push:
    branches:
      - rust-check
  workflow_dispatch:  # Allows manual triggering of the workflow

jobs:
  check_bindgen_version:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
      # Step 1: Set up Rust
      - name: Set up Rust
        uses: rust-lang/setup-rust@v1  # Correct action version (v1)

      # Step 2: Install bindgen-cli using cargo
      - name: Install bindgen
        run: |
          cargo install bindgen-cli  # Install bindgen-cli

      # Step 3: Check bindgen version
      - name: Check Bindgen Version
        run: |
          bindgen --version  # Print the installed version of bindgen
