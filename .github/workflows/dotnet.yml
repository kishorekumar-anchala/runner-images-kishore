name: Check Latest .NET SDK Version

on:
  push:
  workflow_dispatch:

jobs:
  check-dotnet-version:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up jq (for JSON parsing)
      run: sudo apt-get install -y jq

    - name: Fetch .NET SDK releases from GitHub API
      id: fetch_versions
      run: |
        # Fetch the .NET SDK releases from GitHub API
        releases=$(curl -s https://api.github.com/repos/dotnet/core-sdk/releases)

        # Print the raw response to debug
        echo "Raw response:"
        echo "$releases"
        
        # Check if the response is valid JSON before processing
        echo "$releases" | jq .  # This will throw an error if the response is invalid

        # Extract the SDK versions and filter out preview/rc versions
        stable_versions=$(echo "$releases" | jq -r '.[] | select(.tag_name | test("preview|rc") | not) | .tag_name')

        # Get the latest stable version
        latest_stable_version=$(echo "$stable_versions" | sort -V | tail -n 1)

        # Output the latest stable version
        echo "Latest Stable .NET SDK Version: $latest_stable_version"

        # Output the latest stable version as an output variable for use in other steps
        echo "::set-output name=latest_version::$latest_stable_version"

    - name: Check if latest version is supported
      run: |
        # Define supported versions (you can replace this with a file or other logic)
        supported_versions=("7.0" "6.0" "8.0" "9.0")
        
        # Fetch the latest version from previous step
        LATEST_VERSION="${{ steps.fetch_versions.outputs.latest_version }}"
        
        # Check if the latest version is in the list of supported versions
        if [[ " ${supported_versions[@]} " =~ " ${LATEST_VERSION} " ]]; then
          echo "The latest version $LATEST_VERSION is supported."
        else
          echo "The latest version $LATEST_VERSION is NOT supported."
          exit 1
        fi
