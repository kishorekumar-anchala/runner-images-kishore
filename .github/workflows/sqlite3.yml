name: Check SQLite3 Installation

on:
  push:

jobs:
  check-sqlite:
    runs-on: ubuntu-latest  # Use Ubuntu 24.04 (latest version at the time)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Check SQLite3 version
      run: sqlite3 --version  # Check that SQLite3 is installed correctly

    - name: Test SQLite3 functionality
      run: |
        sqlite3 test.db "CREATE TABLE IF NOT EXISTS test (id INTEGER PRIMARY KEY, name TEXT);"  # Create a table
        sqlite3 test.db "INSERT INTO test (name) VALUES ('SQLite3 Test');"  # Insert data
        sqlite3 test.db "SELECT * FROM test;"  # Run a simple query to check functionality
