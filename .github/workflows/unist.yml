name: Install and Cleanup Node.js

on:
  push:

permissions:
  contents: read
  # Update permissions if necessary for more actions, e.g., "contents: write"

jobs:
  install_and_cleanup_node:
    name: Install and Cleanup Node.js
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh # Use PowerShell 7 explicitly

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js (version 16)
        uses: actions/setup-node@v3
        with:
          node-version: '16' # Replace with the desired Node.js version

      - name: Verify Node.js Installation
        run: |
          node --version
          npm --version

      - name: Verify installed packages
        run: |
          Get-Package | Where-Object { $_.Name -match "^Node" }

      - name: Cleanup Node.js (if installed)
        run: |
          $nodePackage = Get-Package | Where-Object { $_.Name -match "^Node" }
          if ($nodePackage) {
            Write-Host "Node.js found. Proceeding with uninstallation."
            Uninstall-Package -Name $nodePackage.Name -Force
          } else {
            Write-Host "No Node.js package found."
          }

      - name: Verify Node.js uninstallation
        run: |
          $nodePackage = Get-Package | Where-Object { $_.Name -match "^Node" }
          if ($nodePackage) {
            Write-Host "Node.js is still installed."
          } else {
            Write-Host "Node.js successfully uninstalled."
          }
