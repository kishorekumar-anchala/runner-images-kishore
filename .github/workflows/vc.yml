name: Check Visual Studio License Expiry Date

on:
  push:
  workflow_dispatch:  # Manual trigger

jobs:
  check-visual-studio-expiry:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check Visual Studio License Expiry Date via Registry
        shell: pwsh
        run: |
          # Registry path for Visual Studio 2022 Enterprise license info (adjust as needed)
          $vsRegistryPath = "HKCU:\SOFTWARE\Microsoft\VisualStudio\17.0"

          # Check if the Visual Studio registry path exists
          if (Test-Path $vsRegistryPath) {
              # Retrieve product license information from the registry
              $licenseKey = Get-ItemProperty -Path $vsRegistryPath -Name "License"

              # Extract any information regarding expiration if available
              if ($licenseKey) {
                  Write-Host "Visual Studio 2022 Enterprise License Information:"
                  Write-Host "License: $($licenseKey.License)"

                  # Assuming expiration data might be stored as a timestamp or string
                  # Attempt to extract expiration details (hypothetical example)
                  $expirationDate = $licenseKey.LicenseExpirationDate

                  if ($expirationDate) {
                      Write-Host "License Expiration Date: $expirationDate"
                      $expiryDateFormatted = [datetime]::Parse($expirationDate)
                      $currentDate = [datetime]::Now
                      $daysLeft = ($expiryDateFormatted - $currentDate).Days

                      Write-Host "Days remaining until expiration: $daysLeft"
                  }
                  else {
                      Write-Host "No explicit expiration date found in registry."
                  }
              }
              else {
                  Write-Host "No license information found in the registry."
                  exit 1
              }
          }
          else {
              Write-Host "Visual Studio 2022 not installed or registry path not found."
              exit 1
          }
