name: Check Visual Studio Expiry

on:
  push: 
  workflow_dispatch:  # Manual trigger

jobs:
  check-expiry:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PowerShell environment
        uses: actions/setup-powershell@v2

      - name: Check Visual Studio License Expiry
        shell: pwsh
        run: |
          $expiryDate = Get-Content 'C:\ProgramData\Microsoft VisualStudio\Packages\_channels\channel_1\license.json' | ConvertFrom-Json | Select-Object -ExpandProperty ExpirationDate
          if ($expiryDate) {
              $expiryDateFormatted = [datetime]::Parse($expiryDate).ToString('yyyy-MM-dd')
              Write-Host "Visual Studio license expires on $expiryDateFormatted"
              if ([datetime]::Now -gt [datetime]::Parse($expiryDate)) {
                  Write-Host "Your Visual Studio license has expired."
                  exit 1
              }
              else {
                  Write-Host "Your Visual Studio license is valid."
              }
          }
          else {
              Write-Host "Could not retrieve license expiry information."
              exit 1
          }
