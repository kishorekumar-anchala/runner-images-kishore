name: Check Visual Studio Installation and License Expiry (Indirect)

on:
  push:
  workflow_dispatch:  # Manual trigger

jobs:
  check-visual-studio-expiry:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check for Visual Studio 2022 Enterprise
        shell: pwsh
        run: |
          # Path to the Visual Studio Installer executable
          $vsInstallerPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"

          # Check if Visual Studio Installer is present
          if (Test-Path $vsInstallerPath) {
              # Query the Visual Studio installation status using vs_installer.exe
              $vsInstallations = & $vsInstallerPath list --installed --format json

              # Convert output to JSON
              $vsInstallationsJson = $vsInstallations | ConvertFrom-Json

              # Filter to check for Visual Studio 2022 Enterprise edition
              $vs2022Enterprise = $vsInstallationsJson | Where-Object { $_.edition -eq 'Enterprise' -and $_.version -like '17*' }

              if ($vs2022Enterprise) {
                  # Extract version and license information
                  $vsVersion = $vs2022Enterprise.version
                  $vsEdition = $vs2022Enterprise.edition
                  Write-Host "Visual Studio 2022 Enterprise is installed."
                  Write-Host "Version: $vsVersion, Edition: $vsEdition"
              }
              else {
                  Write-Host "Visual Studio 2022 Enterprise is not installed."
                  exit 1
              }
          }
          else {
              Write-Host "Visual Studio Installer not found."
              exit 1
          }
