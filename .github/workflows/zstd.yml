name: Check zstd Version

on: [push]

jobs:
  check-zstd-version:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, windows-2019, windows-2025]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install dependencies on Windows
        run: |
          choco install mingw

      - name: Clone zstd Repository and Checkout Version 1.5.7
        run: |
          git clone https://github.com/facebook/zstd.git
          cd zstd
          git checkout tags/v1.5.7
          make CC=gcc

      - name: Check zstd Version
        run: |
          cd zstd
          ./zstd -V
        shell: bash
